<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> - Smart Second-Hand Car Sales</title>
    <meta name="description" content="Trusted Used Cars. Transparent Deals. Smart Choices." />
    <link rel="icon" href="/favicon.ico" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">
    <style>
      /* Basic reset to minimize flash of unstyled content */
      html, body, #root { height: 100%; }
      body { margin: 0; font-family: "Cormorant Garamond", serif; }

      /* Force Google Translate Styles here too as a backup */
      #google_translate_element .goog-te-gadget-simple {
        background-color: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        padding: 0 15px !important;
        border-radius: 8px !important;
        height: 44px !important;
        display: flex !important;
        align-items: center !important;
        cursor: pointer !important;
        text-decoration: none !important;
      }
      #google_translate_element .goog-te-menu-value span {
        color: #ffffff !important;
        font-family: 'Inter', sans-serif !important;
      }
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,ta,ml,kn,te,hi',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false,
          multilanguagePage: true
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
